<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vishwa Music Player</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
    --primary:#00f5ff;
    --secondary:#ff00ff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#000000);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

@keyframes bg{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.player{
    width:420px;
    padding:25px;
    border-radius:25px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 0 40px rgba(0,255,255,0.3);
    color:white;
}

.album{
    width:200px;
    height:200px;
    margin:20px auto;
    border-radius:50%;
    overflow:hidden;
    box-shadow:0 0 25px var(--primary);
}

.album img{
    width:100%;
    height:100%;
    object-fit:cover;
    animation:rotate 10s linear infinite;
    animation-play-state:paused;
}

@keyframes rotate{
    from{transform:rotate(0deg)}
    to{transform:rotate(360deg)}
}

h2{text-align:center;margin-bottom:5px}
p{text-align:center;font-size:14px;opacity:0.7}

.progress-container{
    height:6px;
    background:rgba(255,255,255,0.2);
    border-radius:10px;
    cursor:pointer;
    margin:20px 0 10px;
}

.progress{
    height:100%;
    width:0%;
    background:var(--primary);
    border-radius:10px;
    box-shadow:0 0 10px var(--primary);
}

.time{
    display:flex;
    justify-content:space-between;
    font-size:12px;
}

.controls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:25px;
    margin-top:15px;
}

.controls button{
    background:none;
    border:none;
    color:white;
    font-size:20px;
    cursor:pointer;
    transition:0.3s;
}

.controls button:hover{
    color:var(--primary);
    transform:scale(1.2);
}

.play{
    width:60px;
    height:60px;
    border-radius:50%;
    background:linear-gradient(45deg,var(--primary),var(--secondary));
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 20px var(--primary);
}

.volume-box{
    display:flex;
    align-items:center;
    margin-top:15px;
    gap:10px;
}

.volume-box i{
    cursor:pointer;
}

.volume-box input{
    flex:1;
}

.playlist-toggle{
    text-align:center;
    margin-top:15px;
    cursor:pointer;
    color:var(--primary);
}

.playlist{
    max-height:0;
    overflow:hidden;
    transition:0.4s;
    margin-top:10px;
}

.playlist.show{
    max-height:200px;
    overflow-y:auto;
}

.playlist-item{
    padding:8px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.playlist-item:hover{
    background:rgba(255,255,255,0.1);
}

.playlist-item.active{
    background:rgba(0,255,255,0.2);
}
</style>
</head>

<body>

<div class="player">
    <div class="album">
        <img id="cover" src="https://picsum.photos/300">
    </div>

    <h2 id="title">Starlight</h2>
    <p id="artist">Luna Sky</p>

    <div class="progress-container" id="progress-container">
        <div class="progress" id="progress"></div>
    </div>

    <div class="time">
        <span id="current">0:00</span>
        <span id="duration">0:00</span>
    </div>

    <div class="controls">
        <button id="prev"><i class="fas fa-backward"></i></button>
        <button id="play" class="play"><i class="fas fa-play" id="icon"></i></button>
        <button id="next"><i class="fas fa-forward"></i></button>
    </div>

    <div class="volume-box">
        <i class="fas fa-volume-up" id="mute"></i>
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.7">
    </div>

    <div class="playlist-toggle" id="toggle">
        <i class="fas fa-list"></i> Show Playlist
    </div>

    <div class="playlist" id="playlist"></div>
</div>

<audio id="audio"></audio>

<script>
const audio=document.getElementById("audio");
const playBtn=document.getElementById("play");
const icon=document.getElementById("icon");
const progress=document.getElementById("progress");
const progressContainer=document.getElementById("progress-container");
const current=document.getElementById("current");
const durationEl=document.getElementById("duration");
const cover=document.getElementById("cover");
const volume=document.getElementById("volume");
const muteBtn=document.getElementById("mute");
const playlist=document.getElementById("playlist");
const toggle=document.getElementById("toggle");

const songs=[
{title:"Manamagan sathiyam",artist:"A.R.Rahman",src:"songs/Mamanagan_sathiyam.mp3"},
{title:"Neelothi",artist:"Sooraj Santhosh_ Chinmayi",src:"songs/Neelothi_Song.mp3"},
{title:"Vaarayo Vaarayo",artist:" Harris Jayaraj _ Chinmayi",src:"songs/Vaarayo_Vaarayo.mp3"}
];

let index=0;
let playing=false;

function loadSong(song){
    document.getElementById("title").innerText=song.title;
    document.getElementById("artist").innerText=song.artist;
    audio.src=song.src;
}
loadSong(songs[index]);

function createPlaylist(){
    playlist.innerHTML="";
    songs.forEach((song,i)=>{
        const item=document.createElement("div");
        item.classList.add("playlist-item");
        item.innerText=(i+1)+". "+song.title+" - "+song.artist;
        if(i===index) item.classList.add("active");
        item.addEventListener("click",()=>{
            index=i;
            loadSong(songs[index]);
            playSong();
            updateActive();
        });
        playlist.appendChild(item);
    });
}
createPlaylist();

function updateActive(){
    document.querySelectorAll(".playlist-item").forEach((item,i)=>{
        item.classList.toggle("active",i===index);
    });
}

function playSong(){
    playing=true;
    audio.play();
    icon.classList.replace("fa-play","fa-pause");
    cover.style.animationPlayState="running";
}

function pauseSong(){
    playing=false;
    audio.pause();
    icon.classList.replace("fa-pause","fa-play");
    cover.style.animationPlayState="paused";
}

playBtn.addEventListener("click",()=>{playing?pauseSong():playSong();});

audio.addEventListener("timeupdate",(e)=>{
    const {duration,currentTime}=e.target;
    const percent=(currentTime/duration)*100;
    progress.style.width=percent+"%";

    let curMin=Math.floor(currentTime/60);
    let curSec=Math.floor(currentTime%60);
    if(curSec<10)curSec="0"+curSec;
    current.innerText=curMin+":"+curSec;

    if(duration){
        let durMin=Math.floor(duration/60);
        let durSec=Math.floor(duration%60);
        if(durSec<10)durSec="0"+durSec;
        durationEl.innerText=durMin+":"+durSec;
    }
});

progressContainer.addEventListener("click",(e)=>{
    const width=progressContainer.clientWidth;
    const clickX=e.offsetX;
    audio.currentTime=(clickX/width)*audio.duration;
});

document.getElementById("prev").addEventListener("click",()=>{
    index=(index-1+songs.length)%songs.length;
    loadSong(songs[index]);
    playSong();
    updateActive();
});

document.getElementById("next").addEventListener("click",()=>{
    index=(index+1)%songs.length;
    loadSong(songs[index]);
    playSong();
    updateActive();
});

volume.addEventListener("input",()=>audio.volume=volume.value);

muteBtn.addEventListener("click",()=>{
    audio.muted=!audio.muted;
    muteBtn.classList.toggle("fa-volume-mute");
    muteBtn.classList.toggle("fa-volume-up");
});

toggle.addEventListener("click",()=>{
    playlist.classList.toggle("show");
    toggle.innerHTML=playlist.classList.contains("show")
        ? '<i class="fas fa-list"></i> Hide Playlist'
        : '<i class="fas fa-list"></i> Show Playlist';
});

audio.addEventListener("ended",()=>{
    index=(index+1)%songs.length;
    loadSong(songs[index]);
    playSong();
    updateActive();
});
</script>

</body>
</html>
